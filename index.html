<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการสมาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ตั้งค่าพื้นหลังไล่เฉดม่วงไปชมพู */
        body {
            font-family: "Noto Sans Thai", sans-serif !important;
            min-height: 100vh;
            background: linear-gradient(to bottom, #F7ACFA, #9F2DFD);
            background-attachment: fixed;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9); /* เพิ่มความโปร่งแสงให้คอนเทนเนอร์เพื่อให้เห็นพื้นหลังสวยขึ้น */
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .iframe-wrapper { 
            width: 100%; 
            height: 700px; 
            border: none; 
        }

        /* ปรับสี Tab ให้เข้ากับธีม */
        .nav-tabs .nav-link.active {
            color: #8e44ad;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light p-4">

<div class="container">
    <h2 class="mb-4 text-center">ระบบบริหารจัดการสมาคม</h2>

    <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab1-tab" data-bs-toggle="tab" data-bs-target="#tab1-pane" type="button">1. ลงทะเบียน</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab2-tab" data-bs-toggle="tab" data-bs-target="#tab2-pane" type="button">2. ส่งหลักฐาน</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab3-tab" data-bs-toggle="tab" data-bs-target="#tab3-pane" type="button">3. รายงานการประชุม</button>
        </li>
    </ul>

    <div class="tab-content bg-white p-3 border-start border-end border-bottom rounded-bottom" id="myTabContent">
        
        <!-- Tab 1: ลงทะเบียน -->
        <div class="tab-pane fade show active" id="tab1-pane" role="tabpanel">
            <div class="text-center py-5">
                <iframe src="https://script.google.com/macros/s/AKfycbxORjhfZ4asQEMn7MBLkU030PS6Y7JCnRbYLRc46BReHmUr5V34JCTzpMB6ZyiZ4YQb/exec" class="iframe-wrapper"></iframe>
            </div>
        </div>

        <!-- Tab 2: ส่งหลักฐาน -->
        <div class="tab-pane fade" id="tab2-pane" role="tabpanel">
            <div class="text-center py-5">
                <iframe src="https://script.google.com/macros/s/AKfycbw7Uy8XM8KnZUu6T_xSbO3e8e5bwXozNvVewd7HJ3mYG3yUXmaiN22DOv-_kjL_jTnl/exec" class="iframe-wrapper"></iframe>
            </div>
        </div>

        <!-- Tab 3: รายงานการประชุม -->
        <div class="tab-pane fade" id="tab2-pane" role="tabpanel">
            <div class="text-center py-5">
                <iframe src="https://script.google.com/macros/s/AKfycbzjfZYrReeP0V7dmxAtsHO2aCQb7jcx8TiH-7-7NCS13lcUMsqu9VLnjjVdkXFsM78cZw/exec" class="iframe-wrapper"></iframe>
            </div>
        </div>
    </div>
    
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
