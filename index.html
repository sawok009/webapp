<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบริหารจัดการสมาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700&display=swap');
        
        body {
            font-family: "Noto Sans Thai", sans-serif;
            min-height: 100vh;
            background: linear-gradient(to bottom, #9F2DFD, #F7ACFA);
            background-attachment: fixed;
            margin: 0;
            padding: 20px 10px;
        }

        /* ปรับขนาดตัวอักษรให้เล็กลงในมือถือ */
        @media (max-width: 576px) {
            h1 { font-size: 1.5rem !important; }
            h4 { font-size: 1rem !important; }
            .dashboard-container { padding: 0 !important; }
            .card-menu { padding: 15px !important; }
        }

        .dashboard-container { max-width: 800px; margin: auto; }
        .card-menu { 
            transition: transform 0.3s; 
            cursor: pointer; 
            border-radius: 15px; 
            background: rgba(255, 255, 255, 0.95);
        }
        .card-menu:hover { transform: scale(1.02); }
        .icon-box { font-size: 2rem; color: #9F2DFD; }
        .iframe-container { width: 100%; height: 70vh; border: none; }
    </style>
</head>
<body>

<div class="container dashboard-container text-center">
    <img src="https://lh3.googleusercontent.com/d/1IAE1glO9bBYgpWwoqMZENtA7xRa7YzCP" 
         class="img-fluid mb-3" 
         style="width: 60%; max-width: 150px;"
         onerror="this.src='https://placehold.co/300x150/png?text=Logo';">
    
    <header class="text-white mb-4">
        <h1 class="fw-bold">ระบบบริหารจัดการ</h1>
        <h4 class="mt-2">สมาคมผู้ประกอบวิชาชีพบริการการศึกษาสถานศึกษาเอกชน จังหวัดปทุมธานี</h4>
    </header>

    <div class="row g-3">
        <div class="col-4">
            <div class="card card-menu p-3" onclick="loadContent(1)">
                <div class="icon-box"><i class="fa-solid fa-user-plus"></i></div>
                <small class="fw-bold">ลงทะเบียน</small>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-menu p-3" onclick="loadContent(2)">
                <div class="icon-box"><i class="fa-solid fa-file-invoice"></i></div>
                <small class="fw-bold">ส่งหลักฐาน</small>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-menu p-3" onclick="loadContent(3)">
                <div class="icon-box"><i class="fa-solid fa-microphone-lines"></i></div>
                <small class="fw-bold">ประชุม</small>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="appModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen-sm-down modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <iframe id="modalIframe" class="iframe-container"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function loadContent(id) {
        const modal = new bootstrap.Modal(document.getElementById('appModal'));
        modal.show();
        
        Swal.fire({
            title: 'กำลังโหลด...',
            didOpen: () => { Swal.showLoading() },
            allowOutsideClick: false
        });

        const iframe = document.getElementById('modalIframe');
        const titles = { 1: "ลงทะเบียนสมาชิก", 2: "ระบบส่งหลักฐาน", 3: "รายงานการประชุม" };
        const urls = {
            1: "https://script.google.com/macros/s/AKfycbxORjhfZ4asQEMn7MBLkU030PS6Y7JCnRbYLRc46BReHmUr5V34JCTzpMB6ZyiZ4YQb/exec",
            2: "https://script.google.com/macros/s/AKfycbw7Uy8XM8KnZUu6T_xSbO3e8e5bwXozNvVewd7HJ3mYG3yUXmaiN22DOv-_kjL_jTnl/exec",
            3: "https://script.google.com/macros/s/AKfycbzjfZYrReeP0V7dmxAtsHO2aCQb7jcx8TiH-7-7NCS13lcUMsqu9VLnjjVdkXFsM78cZw/exec"
        };
        
        document.getElementById('modalTitle').innerText = titles[id];
        iframe.src = urls[id];
        iframe.onload = () => Swal.close();
    }
</script>
</body>
</html>
